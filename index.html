    <title>ENCODE Consortium: 26-Year Project Author Browser</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif !important;
        }
        .phase-badge {
            transition: all 0.2s ease-in-out;
        }
        .phase-badge:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">

    <!-- Header Navigation -->
    <header class="bg-gradient-to-r from-blue-900 via-indigo-900 to-slate-900 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight">ENCODE Consortium</h1>
                <p class="text-blue-200 text-sm mt-1 font-medium">Interactive Browser of Authors Across a 26-Years of ENCODE.</p>
            </div>
            <div class="bg-white/10 backdrop-blur-sm px-4 py-2 rounded-xl border border-white/10 text-center">
                <span class="text-xs uppercase tracking-wider text-blue-300 block font-semibold">Consortium Dataset</span>
                <span class="text-2xl font-bold tracking-tight text-white" id="stat-total-authors">0</span>
                <span class="text-sm text-slate-300 ml-1 font-medium">Authors</span>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Summary Analytics Dashboard - Full Width Bar Chart (Histogram) -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8 flex flex-col justify-between">
            <div>
                <h3 class="text-base font-bold text-slate-800 tracking-tight">Authors per Project Phase</h3>
            </div>
            <div class="relative h-64 w-full mt-4">
                <canvas id="phaseHeadcountChart"></canvas>
            </div>
        </div>

        <!-- Toolbar controls & filters block -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6 flex flex-col md:flex-row gap-4 items-center justify-between">
            <!-- Search bar input -->
            <div class="relative w-full md:max-w-md">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400 pointer-events-none">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                </span>
                <input type="text" id="author-search" placeholder="Filter authors by name or affiliation..." 
                       class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:bg-white transition-all text-sm">
            </div>
            
            <!-- Dynamic Filter Toggles -->
            <div class="flex items-center gap-3 w-full md:w-auto justify-end">
                <div class="flex items-center gap-1.5 bg-slate-100 p-1 rounded-xl border border-slate-200" id="phase-filter-pills">
                    <!-- Javascript populates one-row filter buttons -->
                </div>
            </div>
        </div>

        <!-- Main interactive data grid table block -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-200 text-left table-fixed">
                    <thead class="bg-slate-50 text-slate-700 text-xs font-bold uppercase tracking-wider">
                        <tr>
                            <th scope="col" onclick="setSort('name')" class="px-6 py-4 cursor-pointer hover:bg-slate-100 transition-colors w-1/4 select-none">
                                <div class="flex items-center gap-1">
                                    Author
                                    <span id="sort-icon-name" class="text-slate-400">↕</span>
                                </div>
                            </th>
                            <th scope="col" class="px-6 py-4 w-5/12 select-none">Consortium Phases</th>
                            <th scope="col" onclick="setSort('affiliations')" class="px-6 py-4 cursor-pointer hover:bg-slate-100 transition-colors w-1/3 select-none">
                                <div class="flex items-center gap-1">
                                    Affiliation(s)
                                    <span id="sort-icon-affiliations" class="text-slate-400">↕</span>
                                </div>
                            </th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-200 text-sm text-slate-700 bg-white" id="author-table-body">
                        <!-- Javascript populates live filter states -->
                    </tbody>
                </table>
            </div>
            
            <!-- Empty state illustration -->
            <div id="empty-state" class="hidden text-center py-16 px-4">
                <svg class="mx-auto h-12 w-12 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                <h3 class="mt-4 text-sm font-bold text-slate-800">No matching consortium members found</h3>
                <p class="mt-1 text-xs text-slate-500">Refine your active filters or search terms.</p>
            </div>

            <!-- Table record metrics footer showing custom simplified text format -->
            <div class="bg-slate-50 px-6 py-4 border-t border-slate-200 flex items-center justify-between text-sm text-slate-700 font-bold">
                <div id="display-count-summary">0 Authors</div>
                <button id="btn-load-more" onclick="loadNextPage()" class="hidden px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-xs cursor-pointer shadow-sm transition-all font-bold">Load More Authors</button>
            </div>
        </div>

    </main>

    <footer class="bg-slate-900 py-4 mt-12 border-t border-slate-800">
        <!-- Cleaned empty footer placeholder as requested -->
    </footer>

            applyFiltersAndRender();
            
            document.getElementById('author-search').addEventListener('input', (e) => {
                activeQuery = e.target.value ? e.target.value.toLowerCase() : "";
                applyFiltersAndRender();
            });
        });

        function buildFilterPills() {
            const container = document.getElementById('phase-filter-pills');
            if (!container) return;
            
            let html = '<button onclick="clearPhaseFilters()" id="pill-RESET" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-white text-slate-800 shadow-sm border border-slate-200 cursor-pointer transition-all">Clear Selection</button>';
            
            targetPhases.forEach(p => {
                html += '<button onclick="togglePhaseFilter(\'' + p + '\')" id="pill-' + p.replace(/\s+/g, '_') + '" class="px-3 py-1.5 rounded-lg text-xs font-semibold text-slate-600 hover:text-slate-900 hover:bg-slate-100 transition-all cursor-pointer border border-slate-200 bg-white">' + p + '</button>';
            });
            container.innerHTML = html;
        }

        function clearPhaseFilters() {
            selectedPhases = [];
            updatePillsUI();
            applyFiltersAndRender();
        }

        function togglePhaseFilter(phase) {
            const idx = selectedPhases.indexOf(phase);
            if (idx > -1) {
                selectedPhases.splice(idx, 1);
            } else {
                selectedPhases.push(phase);
            }
            updatePillsUI();
            applyFiltersAndRender();
        }

        function updatePillsUI() {
            targetPhases.forEach(p => {
                const btn = document.getElementById('pill-' + p.replace(/\s+/g, '_'));
                if (!btn) return;
                
                if (selectedPhases.includes(p)) {
                    const pal = colorPalette[p];
                    btn.className = 'px-3 py-1.5 rounded-lg text-xs font-bold border transition-all cursor-pointer ' + pal.bg + ' ' + pal.border + ' ' + pal.text + ' shadow-inner scale-95';
                } else {
                    btn.className = 'px-3 py-1.5 rounded-lg text-xs font-semibold text-slate-600 hover:text-slate-900 hover:bg-slate-100 transition-all cursor-pointer border border-slate-200 bg-white';
                }
            });
        }

        function setSort(field) {
            if(sortingField === field) {
                sortingOrder = sortingOrder === "asc" ? "desc" : "asc";
            } else {
                sortingField = field;
                sortingOrder = "asc";
            }
            
            const sortIconName = document.getElementById('sort-icon-name');
            const sortIconAff = document.getElementById('sort-icon-affiliations');
            if (sortIconName) sortIconName.innerText = "↕";
            if (sortIconAff) sortIconAff.innerText = "↕";
            
            const targetIconId = 'sort-icon-' + field;
            const targetElem = document.getElementById(targetIconId);
            if (targetElem) {
                targetElem.innerText = sortingOrder === "asc" ? "▲" : "▼";
            }
            
            applyFiltersAndRender();
        }

        function getLastName(fullName) {
            if (!fullName) return "";
            const clean = fullName.trim().replace(/\s+/g, ' ');
            const parts = clean.split(' ');
            let last = parts[parts.length - 1];
            if (last && ["jr", "jr.", "iii", "ii", "iv", "sr", "sr."].includes(last.toLowerCase()) && parts.length > 1) {
                last = parts[parts.length - 2];
            }
            return last ? last.toLowerCase() : "";
        }

        function applyFiltersAndRender() {
            if (!rawDataset) return;
            
            globalFilteredData = rawDataset.filter(item => {
                if (!item) return false;
                const nameText = item.name ? item.name.toLowerCase() : "";
                const affText = item.affiliations ? item.affiliations.toLowerCase() : "";
                
                const matchesSearch = nameText.includes(activeQuery) || affText.includes(activeQuery);
                
                let matchesSelectedPhases = true;
                if (selectedPhases.length > 0) {
                    matchesSelectedPhases = selectedPhases.every(p => item.phase_flags && item.phase_flags[p] === 1);
                }
                
                return matchesSearch && matchesSelectedPhases;
            });

            globalFilteredData.sort((a, b) => {
                if (sortingField === "name") {
                    let lnA = getLastName(a.name);
                    let lnB = getLastName(b.name);
                    if (lnA < lnB) return sortingOrder === "asc" ? -1 : 1;
                    if (lnA > lnB) return sortingOrder === "asc" ? 1 : -1;
                    return (a.name || "").toLowerCase().localeCompare((b.name || "").toLowerCase()) * (sortingOrder === "asc" ? 1 : -1);
                } else {
                    let vA = (a[sortingField] || "").toLowerCase();
                    let vB = (b[sortingField] || "").toLowerCase();
                    if (vA < vB) return sortingOrder === "asc" ? -1 : 1;
                    if (vA > vB) return sortingOrder === "asc" ? 1 : -1;
                    return 0;
                }
            });

            currentLoadedIndex = 0;
            const body = document.getElementById('author-table-body');
            if (body) body.innerHTML = "";
            
            loadNextPage();
            updateCharts();
        }

        function renderTable(data) {
            // Deprecated full list rendering used by older builds to prevent memory blowups.
            // Function handles structural telemetry checks but logic delegates safely onto loadNextPage.
        }

        function loadNextPage() {
            const body = document.getElementById('author-table-body');
            const emptyState = document.getElementById('empty-state');
            const loadMoreBtn = document.getElementById('btn-load-more');
            if (!body) return;
            
            const summaryElem = document.getElementById('display-count-summary');
            if (summaryElem) summaryElem.innerText = globalFilteredData.length.toLocaleString() + ' Authors';
            
            if(globalFilteredData.length === 0) {
                if (emptyState) emptyState.classList.remove('hidden');
                if (loadMoreBtn) loadMoreBtn.classList.add('hidden');
                return;
            }
            if (emptyState) emptyState.classList.add('hidden');

            let endIndex = Math.min(currentLoadedIndex + recordsPerPage, globalFilteredData.length);
            let html = "";
            
            for (let i = currentLoadedIndex; i < endIndex; i++) {
                const item = globalFilteredData[i];
                let badgesHtml = '<div class="flex flex-wrap gap-1.5">';
                targetPhases.forEach(p => {
                    if(item.phase_flags && item.phase_flags[p] === 1) {
                        const style = colorPalette[p];
                        const role = item.phases_summary && item.phases_summary[p] ? String(item.phases_summary[p]) : "";
                        const roleTitle = role.replace(/"/g, '&quot;');
                        badgesHtml += '<span title="' + roleTitle + '" class="phase-badge px-2 py-1 rounded-md text-[10px] font-bold border ' + style.bg + ' ' + style.border + ' ' + style.text + ' shadow-2xs select-none max-w-max cursor-help">' + p + '</span>';
                    } else {
                        badgesHtml += '<span class="px-2 py-1 rounded-md text-[10px] font-semibold bg-slate-100 text-slate-300 border border-slate-200 border-dashed line-through select-none max-w-max opacity-40">' + p + '</span>';
                    }
                });
                badgesHtml += '</div>';

                let specialBadge = "";
                let rowBg = "";
                if(item.all_7_phases) {
                    specialBadge = '<span class="inline-flex items-center px-1.5 py-0.5 rounded-md text-[10px] font-bold bg-amber-500 text-white ml-2 shadow-2xs tracking-wider uppercase">👑 Grand Stalwart</span>';
                    rowBg = "bg-gradient-to-r from-amber-100/40 via-amber-50/10 to-white";
                } else if(item.all_human_phases) {
                    specialBadge = '<span class="inline-flex items-center px-1.5 py-0.5 rounded-md text-[10px] font-bold bg-blue-600 text-white ml-2 shadow-2xs tracking-wider uppercase">Stalwart</span>';
                    rowBg = "bg-gradient-to-r from-blue-50/40 via-white to-white";
                }

                const nameVal = item.name ? item.name : "";
                const affVal = item.affiliations ? item.affiliations : "";

                html += '<tr class="hover:bg-slate-50/80 transition-colors border-b border-slate-200/60 ' + rowBg + '">' +
                    '<td class="px-6 py-4 font-semibold text-slate-900 align-middle tracking-tight">' +
                        '<div class="flex items-center">' + nameVal + specialBadge + '</div>' +
                    '</td>' +
                    '<td class="px-6 py-4 align-middle font-normal text-xs text-slate-500">' + badgesHtml + '</td>' +
                    '<td class="px-6 py-4 align-middle text-slate-600 font-normal leading-relaxed break-words text-xs max-w-xs">' + affVal + '</td>' +
                '</tr>';
            }
            
            body.insertAdjacentHTML('beforeend', html);
            currentLoadedIndex = endIndex;
            
            if (loadMoreBtn) {
                if (currentLoadedIndex < globalFilteredData.length) {
                    loadMoreBtn.classList.remove('hidden');
                } else {
                    loadMoreBtn.classList.add('hidden');
                }
            }
        }

        function initCharts() {
            const countsPerPhase = {};
            targetPhases.forEach(p => countsPerPhase[p] = 0);

            rawDataset.forEach(item => {
                if (item && item.phase_flags) {
                    targetPhases.forEach(p => {
                        if (item.phase_flags[p] === 1) countsPerPhase[p]++;
                    });
                }
            });

            const barCanvas = document.getElementById('phaseHeadcountChart');
            if (barCanvas) {
                const barCtx = barCanvas.getContext('2d');
                barChartInstance = new Chart(barCtx, {
                    type: 'bar',
                    data: {
                        labels: targetPhases,
                        datasets: [{
                            label: 'Number of authors',
                            data: targetPhases.map(p => countsPerPhase[p]),
                            backgroundColor: targetPhases.map(p => colorPalette[p].hex),
                            borderRadius: 8,
                            barThickness: 36
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { 
                            legend: { display: false },
                            tooltip: { titleFont: { family: 'Arial' }, bodyFont: { family: 'Arial' } }
                        },
                        scales: {
                            y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { family: 'Arial', size: 11 } } },
                            x: { grid: { display: false }, ticks: { font: { family: 'Arial', size: 11, weight: 'bold' } } }
                        }
                    }
                });
            }
        }

        function updateCharts() {
            if (!barChartInstance) return;
            const countsPerPhase = {};
            targetPhases.forEach(p => countsPerPhase[p] = 0);

            globalFilteredData.forEach(item => {
                if (item && item.phase_flags) {
                    targetPhases.forEach(p => {
                        if (item.phase_flags[p] === 1) countsPerPhase[p]++;
                    });
                }
            });
            barChartInstance.data.datasets[0].data = targetPhases.map(p => countsPerPhase[p]);
            barChartInstance.update();
        }
    </script>
</body>
</html>
